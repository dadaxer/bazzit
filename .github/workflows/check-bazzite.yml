name: Check Bazzite Images

on:
    schedule:
        - cron: "0 * * * *" # check every hour
    workflow_dispatch:

jobs:
    check:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        strategy:
            matrix:
                image:
                    - name: bazzite-deck-stable
                      ref: ghcr.io/ublue-os/bazzite-deck:stable
                      file: .bazzite_deck_digest
                    - name: bazzite-stable
                      ref: ghcr.io/ublue-os/bazzite:stable
                      file: .bazzite_digest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Install skopeo
              run: |
                  sudo apt-get update
                  sudo apt-get install -y skopeo jq

            - name: Fetch current digest
              id: digest
              run: |
                  DIGEST=$(skopeo inspect docker://${{ matrix.image.ref }} | jq -r '.Digest')
                  echo "digest=$DIGEST" >> $GITHUB_OUTPUT

            - name: Load last known digest
              id: last
              run: |
                  if [ -f "${{ matrix.image.file }}" ]; then
                    echo "last=$(cat ${{ matrix.image.file }})" >> $GITHUB_OUTPUT
                  else
                    echo "last=none" >> $GITHUB_OUTPUT
                  fi

            - name: Compare digests
              id: compare
              run: |
                  if [ "${{ steps.digest.outputs.digest }}" != "${{ steps.last.outputs.last }}" ]; then
                    echo "updated=true" >> $GITHUB_OUTPUT
                  else
                    echo "updated=false" >> $GITHUB_OUTPUT
                  fi

            - name: Save new digest
              if: steps.compare.outputs.updated == 'true'
              run: |
                  echo "${{ steps.digest.outputs.digest }}" > ${{ matrix.image.file }}
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git add ${{ matrix.image.file }}
                  git commit -m "Update digest for ${{ matrix.image.name }}"
                  git push

            - name: Trigger bluebuild workflow
              if: steps.compare.outputs.updated == 'true'
              uses: peter-evans/repository-dispatch@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  repository: ${{ github.repository }}
                  event-type: bazzite-updated
                  client-payload: |
                      {
                        "image": "${{ matrix.image.name }}",
                        "ref": "${{ matrix.image.ref }}"
                      }
