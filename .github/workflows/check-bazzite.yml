name: Check Bazzite Images

on:
    schedule:
        - cron: "42 */6 * * *" # check every 6 hours
    workflow_dispatch:

jobs:
    check:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Wichtig, um alle Branches zu sehen

            - name: Fetch current digest
              id: digest
              run: |
                  set -e
                  DIGest=$(skopeo inspect docker://ghcr.io/ublue-os/bazzite-deck:stable | jq -r '.Digest')
                  echo "digest=$DIGest" >> $GITHUB_OUTPUT

            - name: Load last known digest from state branch
              id: last
              run: |
                  # Versuche die Datei aus dem 'bazzite-state' Branch zu lesen
                  if git show bazzite-state:.bazzite_digest > .bazzite_digest 2>/dev/null; then
                    echo "last=$(cat .bazzite_digest)" >> $GITHUB_OUTPUT
                  else
                    echo "last=none" >> $GITHUB_OUTPUT
                  fi

            - name: Compare digests
              id: compare
              run: |
                  if [ "${{ steps.digest.outputs.digest }}" != "${{ steps.last.outputs.last }}" ]; then
                    echo "updated=true" >> $GITHUB_OUTPUT
                  else
                    echo "updated=false" >> $GITHUB_OUTPUT
                  fi

            - name: Update state branch
              if: steps.compare.outputs.updated == 'true'
              run: |
                  # 1. Sicherstellen, dass wir den bazzite-state Branch haben oder erstellen
                  git checkout -b bazzite-state || git checkout bazzite-state

                  # 2. Die neue Datei schreiben
                  echo "${{ steps.digest.outputs.digest }}" > .bazzint_digest

                  # 3. Commit und Push auf den state-Branch
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add .bazzite_digest
                  git commit -m "chore: update bazzite digest to ${{ steps.digest.outputs.digest }}"
                  git push origin bazzite-state

            - name: Trigger bluebuild workflow
              if: steps.compare.outputs.updated == 'true'
              uses: peter-evans/repository-dispatch@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  repository: ${{ github.repository }}
                  event-type: bazzite-updated
